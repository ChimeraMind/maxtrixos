insmod part_gpt
insmod btrfs
insmod fat
insmod blsuki
insmod smbios

set default=0

search --no-floppy --fs-uuid %BOOTUUID% --set root

# Enable serial console if running in QEMU for testing.
# The test harness overrides the SMBIOS manufacturer field so that
# grub.cfg can detect it with a single, always-valid smbios call
# (manufacturer / string 4 is present on every x86 system).
smbios --type 1 --get-string 4 --set smbios_manufacturer

if [ "${smbios_manufacturer}" = "matrixos-testmode-serial" ]; then
    set timeout=1
    insmod serial
    serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1
    terminal_output --append serial
    terminal_input --append serial

    blscfg -p /.imager.vmtest/entries
else
    set timeout=5
    loadfont /grub/fonts/unicode.pf2
    set theme=/grub/themes/%OSNAME%-theme/theme.txt
    set gfxmode=auto
    set gfxpayload=keep
    insmod all_video
    insmod png
    insmod gfxterm
    terminal_output gfxterm

    blscfg -p /loader/entries

    menuentry "Memtest86+" {
        search --no-floppy --fs-uuid %EFIUUID% --set=root
        chainloader /efi/BOOT/memtest86plus.efi
    }
fi
